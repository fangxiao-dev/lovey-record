version: '3.8'

services:
  db:
    image: mysql:8.4
    container_name: lovey-record-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: lovey_record
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
