name: Document Audit

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run doc-audit unit tests
        run: python -m unittest discover -s tests/doc_audit -p 'test_*.py' -v

      - name: Run document audit (daily mode)
        run: python scripts/run_doc_audit.py --mode daily

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doc-audit-report
          path: |
            docs/generated/doc-audit/latest-report.md
            docs/generated/doc-audit/latest.patch
          retention-days: 30
