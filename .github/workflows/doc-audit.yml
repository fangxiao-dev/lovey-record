name: Code Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: npm ci
        working-directory: backend
      - name: Run backend tests
        run: npm test
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run frontend unit tests
        run: node --test 'frontend/services/**/__tests__/*.test.mjs' 'frontend/components/**/__tests__/*.test.mjs'
