name: Document Audit

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily (北京时间 10:00)
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run doc-audit unit tests
        run: python -m unittest tests.doc_audit.test_entrypoints tests.doc_audit.test_graph tests.doc_audit.test_classifier tests.doc_audit.test_reporting tests.doc_audit.test_init_mode -v

      - name: Run document audit (daily mode)
        run: python scripts/run_doc_audit.py --mode daily

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doc-audit-report
          path: docs/generated/doc-audit/
          retention-days: 30
          if-no-files-found: warn
